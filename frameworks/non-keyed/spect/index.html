<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Spect-"non-keyed"</title>
    <link href="/css/currentStyle.css" rel="stylesheet"/>
</head>
<body>
<div id='main'>
    <div class="container">
        <div class="jumbotron">
            <div class="row">
                <div class="col-md-6">
                    <h1>Spect-"non-keyed"</h1>
                </div>
                <div class="col-md-6">
                    <div class="row">
                        <div class="col-sm-6 smallpad">
                            <button type='button' class='btn btn-primary btn-block' id='run'>Create 1,000 rows</button>
                        </div>
                        <div class="col-sm-6 smallpad">
                            <button type='button' class='btn btn-primary btn-block' id='runlots'>Create 10,000 rows</button>
                        </div>
                        <div class="col-sm-6 smallpad">
                            <button type='button' class='btn btn-primary btn-block' id='add'>Append 1,000 rows</button>
                        </div>
                        <div class="col-sm-6 smallpad">
                            <button type='button' class='btn btn-primary btn-block' id='update'>Update every 10th row</button>
                        </div>
                        <div class="col-sm-6 smallpad">
                            <button type='button' class='btn btn-primary btn-block' id='clear'>Clear</button>
                        </div>
                        <div class="col-sm-6 smallpad">
                            <button type='button' class='btn btn-primary btn-block' id='swaprows'>Swap Rows</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <table class="table table-hover table-striped test-data">
            <tbody id="tbody"></tbody>
        </table>
        <span class="preloadicon glyphicon glyphicon-remove" aria-hidden="true"></span>
    </div>
</div>

<script type="module">
import { $, h, v } from './web_modules/spect.js'

function random(max) {
  return Math.round(Math.random() * 1000) % max;
}

const A = ["pretty", "large", "big", "small", "tall", "short", "long", "handsome", "plain", "quaint", "clean",
    "elegant", "easy", "angry", "crazy", "helpful", "mushy", "odd", "unsightly", "adorable", "important", "inexpensive",
    "cheap", "expensive", "fancy"];
const C = ["red", "yellow", "blue", "green", "pink", "brown", "purple", "brown", "white", "black", "orange"];
const N = ["table", "chair", "house", "bbq", "desk", "car", "pony", "cookie", "sandwich", "burger", "pizza", "mouse",
    "keyboard"];

let nextId = 1;

function buildData(count) {
    const data = new Array(count);
    for (let i = 0; i < count; i++) {
        data[i] = {
            id: nextId++,
            label: `${A[random(A.length)]} ${C[random(C.length)]} ${N[random(N.length)]}`,
        };
    }
    return data;
}


const data = v(() => [])
h`<${$`tbody`[0]}>${ v(data, data => data.map(item => h`
    <tr class=${false ? "danger" : ""}>
        <td class="col-md-1">${item.id}</td>
        <td class="col-md-4"><a onclick=${e => onSelect}>${item.label}</a></td>
        <td class="col-md-1"><a onclick=${e => onRemove}>${
            h`<span class="glyphicon glyphicon-remove" aria-hidden="true"></span>`
        }</a></td>
        <td class="col-md-6"></td>
    </tr>`
    ))
}</>`

$`#run`[0].onclick = e => {
    data(buildData(1000))
}
$`#runlots`[0].onclick = e => {
    data(buildData(10000))
}
$`#add`[0].onclick = e => {
    data(data().concat(buildData(1000)))
}
$`#update`[0].onclick = el => {
    const items = data();
    for (let i = 0; i < items.length; i += 10) {
        const item = items[i];
        items[i] = { id: item.id, label: item.label + ' !!!' };
    }
    data(items)
}
$`#clear`[0].onclick = e => {
    data([])
}
$`#swaprows`[0].onclick = el => {
    const items = data()
    if (items.length > 998) {
        let temp = items[1];
        items[1] = items[998];
        items[998] = temp;
    }
    data(items)
}
</script>

</body>
</html>
